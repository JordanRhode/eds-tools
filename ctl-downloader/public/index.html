<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CT Log Subdomain Scanner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: #38bdf8; }
    p.subtitle { color: #94a3b8; margin-bottom: 2rem; }
    .search-box { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
    input[type="text"] {
      flex: 1; padding: 0.75rem 1rem; border-radius: 0.5rem; border: 1px solid #334155;
      background: #1e293b; color: #e2e8f0; font-size: 1rem; outline: none;
    }
    input[type="text"]:focus { border-color: #38bdf8; }
    button {
      padding: 0.75rem 1.5rem; border-radius: 0.5rem; border: none;
      background: #0ea5e9; color: white; font-size: 1rem; cursor: pointer; font-weight: 600;
    }
    button:hover { background: #0284c7; }
    button:disabled { background: #475569; cursor: not-allowed; }
    .status { padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem; display: none; }
    .status.info { display: block; background: #1e3a5f; border: 1px solid #2563eb; }
    .status.error { display: block; background: #3b1219; border: 1px solid #dc2626; }
    .status.success { display: block; background: #14332a; border: 1px solid #16a34a; }
    .results { margin-top: 1rem; }
    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .results-header h2 { font-size: 1.2rem; color: #38bdf8; }
    .download-btn {
      padding: 0.5rem 1rem; border-radius: 0.375rem; border: 1px solid #334155;
      background: #1e293b; color: #e2e8f0; font-size: 0.875rem; cursor: pointer; text-decoration: none;
    }
    .download-btn:hover { background: #334155; }
    .subdomain-list {
      background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem;
      max-height: 500px; overflow-y: auto; padding: 0.5rem 0;
    }
    .subdomain-list div {
      padding: 0.4rem 1rem; font-family: monospace; font-size: 0.9rem; border-bottom: 1px solid #0f172a;
    }
    .subdomain-list div:last-child { border-bottom: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>CT Log Subdomain Scanner</h1>
    <p class="subtitle">Query Certificate Transparency logs to discover subdomains</p>

    <div class="search-box">
      <input type="text" id="domain" placeholder="example.com" autofocus>
      <button id="scanBtn" onclick="scan()">Scan</button>
    </div>

    <div id="status" class="status"></div>
    <div id="results" class="results" style="display:none">
      <div class="results-header">
        <h2 id="resultsTitle"></h2>
        <a id="downloadLink" class="download-btn">Download Log</a>
      </div>
      <div id="subdomainList" class="subdomain-list"></div>
    </div>
  </div>

  <script>
    const domainInput = document.getElementById("domain");
    domainInput.addEventListener("keydown", (e) => { if (e.key === "Enter") scan(); });

    async function scan() {
      const domain = domainInput.value.trim();
      if (!domain) return;

      const btn = document.getElementById("scanBtn");
      const status = document.getElementById("status");
      const results = document.getElementById("results");

      btn.disabled = true;
      btn.textContent = "Scanning...";
      results.style.display = "none";
      status.className = "status info";
      status.textContent = `Querying CT logs for ${domain}... This may take a moment.`;

      try {
        const res = await fetch("/api/scan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ domain }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        status.className = "status success";
        status.textContent = `Found ${data.total} unique subdomains for ${data.domain}`;

        document.getElementById("resultsTitle").textContent = `${data.total} Subdomains`;
        document.getElementById("downloadLink").href = `/api/logs/${data.domain}/download`;

        const list = document.getElementById("subdomainList");
        list.innerHTML = data.subdomains.map((s) => `<div>${s}</div>`).join("");
        results.style.display = "block";
      } catch (err) {
        status.className = "status error";
        status.textContent = err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = "Scan";
      }
    }
  </script>
</body>
</html>
